









<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuoteVault • Random Quotes</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>QuoteVault</h1>
      <p>Inspiration in every click</p>
    </div>

    <div class="quote-card">
      <div class="quote" id="quote">
        "The only way to do great work is to love what you do."
      </div>
      <div class="author" id="author">- Steve Jobs</div>
      
      <div class="buttons">
        <button id="new-quote" class="btn primary">
          New Quote
        </button>
        <button id="copy" class="btn secondary">
          Copy
        </button>
        <button id="tweet" class="btn secondary">
          Tweet
        </button>
      </div>
    </div>

    <div class="footer">
      <p>Made with ❤️ for GitHub</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
